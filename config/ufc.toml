[sport]
name = "ufc"
display_name = "UFC / MMA"

[prizepicks]
leagues = { ufc = 12 }

[stat_types]
single = ["SIGNIFICANT_STRIKES", "TAKEDOWNS", "KNOCKDOWN_WIN", "FIGHT_MINUTES",
          "CURRENT_WIN_STREAK", "CURRENT_LOSE_STREAK", "AVG_SIG_STR_PCT",
          "AVG_TD_PCT", "LONGEST_WIN_STREAK", "TOTAL_TITLE_BOUTS"]
combined = []

[features]
rolling_windows = [3, 5]
season_lookback = 5
min_fights_for_features = 3
recency_decay = 0.005

[model]
max_line_diff = 15.0
max_edge_override = 0.15
