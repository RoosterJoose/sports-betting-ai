[sport]
name = "nba"
display_name = "NBA"
prizepicks_league_id = 7

[stat_types]
single = ["PTS", "REB", "AST", "STL", "BLK", "TOV", "FG3M", "FG3A", "FGM", "FTM", "FTA"]
combined = ["PR", "PA", "RA", "PRA", "SB", "FPTS"]

[features]
rolling_windows = [3, 5, 10, 20]
season_lookback = 4
min_games_for_features = 5
opponent_adjusted = true
recency_decay = 0.001

[model]
max_line_diff_pts = 4.0
max_line_diff_stl_blk = 2.0
max_edge_override = 0.15
